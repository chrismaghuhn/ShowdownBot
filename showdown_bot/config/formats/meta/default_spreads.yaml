# Worst-case EV/nature/item presets per VGC meta species.
#
# Each species defines two role presets:
#   offense  -> max offense + min defensive investment (most damage dealt /
#               most damage taken). Applied to a mon when it is the ATTACKER,
#               or to an opposing mon when computing the incoming-damage
#               worst-case (it hits hardest).
#   defense  -> max bulk (HP + defenses). Applied to a mon when it is the
#               DEFENDER worst-case ("does it survive / can I even KO it").
#
# nature: PS nature name. evs: only invested stats need listing (0 otherwise).
# items: candidate held items (first is the default assumption).

default:
  offense:
    nature: Hasty
    evs: {atk: 252, spa: 252, spe: 252}
    items: [Life Orb, Choice Specs, Focus Sash]
  defense:
    nature: Bold
    evs: {hp: 252, def: 252, spd: 252}
    items: [Leftovers, Assault Vest, Sitrus Berry]

