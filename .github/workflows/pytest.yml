name: pytest slice smoke

on:
  push:
  pull_request:

jobs:
  slice-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showdown_bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install calc bridge dependencies
        run: npm ci --prefix tools/calc --no-audit --no-fund

      - name: Install showdown_bot package
        run: pip install -e ".[dev]"

      - name: Run reconciliation slice smoke tests
        run: >
          python -m pytest
          tests/test_candidate_identity.py
          tests/test_decision_capture.py
          tests/test_label_provider.py
          tests/eval/test_accuracy_gate_b.py
          tests/eval/test_accuracy_cap_derisk.py
          tests/eval/test_candidate_identity_replay.py
          tests/test_fast_board_protect.py
          -q --tb=line

  # Separate, parallel job -- deliberately NOT folded into slice-smoke's list.
  # The Champions Mega track (I7a + I7b) was invisible to CI until now: a green run on a
  # Champions-Mega PR proved only that nothing ELSE broke. Its own job means a failure
  # names the track directly, and neither job blocks or slows the other.
  # Scope is the Mega track plus what it actually stands on -- NOT the full suite
  # (~14 min locally). CI stays a targeted gate by design.
  # test_candidate_identity / test_decision_capture are deliberately absent: slice-smoke
  # already covers them, and running them twice per PR buys nothing.
  champions-mega:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showdown_bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install calc bridge dependencies
        run: npm ci --prefix tools/calc --no-audit --no-fund

      # The Mega form/species metadata under engine/ is generated. If a regen is pending,
      # every downstream Mega assertion is testing stale inputs -- so fail here, loudly,
      # before any of them get a chance to pass for the wrong reason.
      - name: Install generator dependencies
        run: npm ci --prefix tools/gen --no-audit --no-fund

      - name: Check generated metadata is fresh
        run: npm run check --prefix tools/gen

      - name: Install showdown_bot package
        run: pip install -e ".[dev]"

      - name: Run Champions Mega track tests
        run: >
          python -m pytest
          tests/i7a/
          tests/i7b/
          tests/test_movedata.py
          tests/test_items.py
          tests/test_request_models.py
          tests/test_legal_actions.py
          tests/test_actions.py
          tests/test_encoder.py
          tests/test_battle_state.py
          tests/test_speed.py
          tests/test_spreads.py
          tests/test_evaluate.py
          tests/test_opponent.py
          tests/test_protect_priors.py
          tests/test_search_depth2.py
          tests/test_config_env.py
          tests/test_mega_evidence.py
          tests/test_config_manifest_freeze.py
          tests/test_gauntlet_dispatch.py
          tests/test_panel.py
          tests/test_schedule.py
          -q --tb=line
